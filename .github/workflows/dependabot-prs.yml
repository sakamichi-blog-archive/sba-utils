name: Dependabot PRs

on: pull_request

permissions: {}

jobs:
  dependabot-metadata:
    name: Fetch metadata
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.head.user.login == 'dependabot[bot]'
    permissions:
      pull-requests: read
    outputs:
      dependency-type: ${{ steps.dependabot-metadata.outputs.dependency-type }}
      update-type: ${{ steps.dependabot-metadata.outputs.update-type }}
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0

  auto-merge:
    name: Auto-merge
    runs-on: ubuntu-latest
    needs: dependabot-metadata
    if: |
      needs.dependabot-metadata.outputs.dependency-type != 'direct:production' &&
      needs.dependabot-metadata.outputs.update-type != 'version-update:semver-major'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
